  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ---- Zibby 2.0 redesign ---- */
:root {
  --accent: #10b981;
  --accent-2: #6366f1;
  --accent-soft: rgba(16, 185, 129, 0.12);
  --accent-ring: rgba(16, 185, 129, 0.35);

  /* dark */
  --bg-0: #0a0b0d;
  --bg-1: #0f1114;
  --bg-2: #151820;
  --bg-3: #1b1f28;
  --bg-hover: #1e222c;
  --border: #22262f;
  --border-2: #2d323d;
  --text-0: #e6e8ec;
  --text-1: #b4b8c2;
  --text-2: #7a8090;
  --text-3: #555a66;

  --rose: #f43f5e;
  --amber: #f59e0b;
  --sky: #38bdf8;
  --violet: #a78bfa;
  --emerald: #10b981;

  --radius: 10px;
  --radius-sm: 6px;
  --shadow-1: 0 1px 2px rgba(0,0,0,.35);
  --shadow-2: 0 8px 24px rgba(0,0,0,.45);

  --mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}

.theme-light {
  --bg-0: #f6f6f4;
  --bg-1: #ffffff;
  --bg-2: #fafaf8;
  --bg-3: #f0f0ec;
  --bg-hover: #ececea;
  --border: #e6e6e2;
  --border-2: #d4d4d0;
  --text-0: #0e0f12;
  --text-1: #3a3e48;
  --text-2: #6b7280;
  --text-3: #9aa0ac;
  --shadow-1: 0 1px 2px rgba(0,0,0,.06);
  --shadow-2: 0 12px 28px rgba(0,0,0,.10);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--text-0); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
button { font-family: inherit; }
input, textarea, select { font-family: inherit; }

/* scrollbar */
.zb *::-webkit-scrollbar { width: 10px; height: 10px; }
.zb *::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
.zb *::-webkit-scrollbar-thumb:hover { background: var(--text-3); background-clip: padding-box; border: 2px solid transparent; }

/* focus */
.zb button:focus-visible, .zb input:focus-visible, .zb textarea:focus-visible, .zb select:focus-visible, .zb [tabindex]:focus-visible {
  outline: 2px solid var(--accent-ring);
  outline-offset: 2px;
}

/* typography helpers */
.mono { font-family: var(--mono); }
.tabular { font-variant-numeric: tabular-nums; }

/* tiny animations */
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.25); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes slide-up {
  from { transform: translateY(8px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

.dot-running {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--emerald);
  box-shadow: 0 0 0 0 var(--accent-ring);
  animation: pulse-dot 1.4s ease-in-out infinite;
}

.spinner {
  width: 14px; height: 14px; border-radius: 50%;
  border: 1.5px solid var(--border-2); border-top-color: var(--emerald);
  animation: spin .8s linear infinite;
}

.shimmer-bar {
  background: linear-gradient(90deg, transparent, rgba(16,185,129,.25), transparent);
  background-size: 200% 100%;
  animation: shimmer 1.8s linear infinite;
}

/* flowing caret for terminal-style logs */
@keyframes caret { 50% { opacity: 0; } }
.caret::after { content: '▊'; color: var(--emerald); margin-left: 2px; animation: caret 1s steps(1) infinite; }

/* kanban column drop hint */
.col-drop-hint {
  border: 1.5px dashed var(--accent-ring);
  background: var(--accent-soft);
}

/* density — compact tightens padding & font on key surfaces */
.zb[data-density="compact"] { font-size: 12px; }
.zb[data-density="compact"] .task-card { padding: 8px 10px; }
.zb[data-density="compact"] .kanban-col { padding: 10px; gap: 8px; }
.zb[data-density="compact"] header { padding: 10px 16px !important; }
.zb[data-density="compact"] main { padding: 12px 16px 18px !important; gap: 12px !important; }

    html, body, #root { height: 100%; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; margin: 0; }
    .mono, pre, code, kbd { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
  </style>

/* global React */

// ── NightCoder: crescent moon + code glyph ──────────────────────────────
function NightCoderMark({ size = 30, accent = '#10b981', style }) {
  const id = React.useId();
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" style={style} aria-label="NightCoder">
      <defs>
        <linearGradient id={`nc-${id}`} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor={accent} stopOpacity="0.95"/>
          <stop offset="100%" stopColor={accent} stopOpacity="0.55"/>
        </linearGradient>
        <radialGradient id={`nc-glow-${id}`} cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor={accent} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={accent} stopOpacity="0"/>
        </radialGradient>
      </defs>
      <circle cx="16" cy="16" r="15" fill={`url(#nc-glow-${id})`}/>
      <mask id={`nc-crescent-${id}`}>
        <rect width="32" height="32" fill="black"/>
        <circle cx="16" cy="16" r="12" fill="white"/>
        <circle cx="21" cy="12" r="10" fill="black"/>
      </mask>
      <rect width="32" height="32" fill={`url(#nc-${id})`} mask={`url(#nc-crescent-${id})`}/>
      <g stroke="#04140d" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none">
        <path d="M11 14.5 L8.5 17 L11 19.5"/>
        <path d="M15.5 13 L13 21"/>
      </g>
      <circle cx="23" cy="22" r="1" fill={accent}/>
      <circle cx="25" cy="9" r="0.7" fill={accent} opacity="0.7"/>
    </svg>
  );
}

// ── DayCoder: sun with radiating rays + code glyph ──────────────────────
function DayCoderMark({ size = 30, accent = '#f59e0b', style }) {
  const id = React.useId();
  // ink color for the code glyph — stays legible on the bright sun disc
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" style={style} aria-label="DayCoder">
      <defs>
        <linearGradient id={`dc-${id}`} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor={accent} stopOpacity="1"/>
          <stop offset="100%" stopColor={accent} stopOpacity="0.7"/>
        </linearGradient>
        <radialGradient id={`dc-glow-${id}`} cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor={accent} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={accent} stopOpacity="0"/>
        </radialGradient>
      </defs>
      {/* soft glow */}
      <circle cx="16" cy="16" r="15" fill={`url(#dc-glow-${id})`}/>
      {/* sun rays */}
      <g stroke={accent} strokeWidth="1.6" strokeLinecap="round" opacity="0.9">
        <line x1="16" y1="2.5" x2="16" y2="5.5"/>
        <line x1="16" y1="26.5" x2="16" y2="29.5"/>
        <line x1="2.5" y1="16" x2="5.5" y2="16"/>
        <line x1="26.5" y1="16" x2="29.5" y2="16"/>
        <line x1="6.2" y1="6.2" x2="8.4" y2="8.4"/>
        <line x1="23.6" y1="23.6" x2="25.8" y2="25.8"/>
        <line x1="6.2" y1="25.8" x2="8.4" y2="23.6"/>
        <line x1="23.6" y1="8.4" x2="25.8" y2="6.2"/>
      </g>
      {/* sun disc */}
      <circle cx="16" cy="16" r="9" fill={`url(#dc-${id})`}
        stroke={accent} strokeOpacity="0.4" strokeWidth="0.5"/>
      {/* code glyph: </> centered */}
      <g stroke="#3a1f00" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none">
        <path d="M13 13 L10.5 16 L13 19"/>
        <path d="M19 13 L21.5 16 L19 19"/>
        <path d="M17 12 L15 20"/>
      </g>
    </svg>
  );
}

// Theme-aware brand mark — flips logo with theme.
function BrandMark({ theme = 'dark', size = 30, accent, style }) {
  if (theme === 'light') {
    return <DayCoderMark size={size} accent={accent || '#f59e0b'} style={style}/>;
  }
  return <NightCoderMark size={size} accent={accent || '#10b981'} style={style}/>;
}

function NightCoderWordmark({ accent = '#10b981', size = 14 }) {
  return (
    <div style={{display:'flex', alignItems:'baseline', gap:1,
      fontFamily: 'Inter, system-ui, sans-serif',
      fontSize: size, fontWeight: 700, letterSpacing:'-.02em',
      lineHeight: 1}}>
      <span style={{color:'var(--text-0)'}}>night</span>
      <span style={{color: accent}}>coder</span>
    </div>
  );
}

window.NightCoderMark = NightCoderMark;
window.DayCoderMark = DayCoderMark;
window.BrandMark = BrandMark;
window.NightCoderWordmark = NightCoderWordmark;

// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>

          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"

                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>

function TweakSection({ label, children }) {

      {children}
    </>

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

    folder: <><path d="M3 6a2 2 0 0 1 2-2h3.5l2 2H19a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6Z"/></>,

};

const Btn = ({ variant = 'ghost', size = 'md', icon, children, style, ...rest }) => {
  const base = {
    display: 'inline-flex', alignItems: 'center', gap: 6,
    height: size === 'sm' ? 28 : size === 'lg' ? 38 : 32,
    padding: size === 'sm' ? '0 10px' : '0 12px',
    borderRadius: 8, fontSize: 13, fontWeight: 500,
    cursor: 'pointer', border: '1px solid transparent',
    transition: 'background .12s, border-color .12s, color .12s',
    whiteSpace: 'nowrap',
  };
  const variants = {
    primary: { background: 'var(--emerald)', color: '#04140d', border: '1px solid var(--emerald)' },
    secondary: { background: 'var(--bg-3)', color: 'var(--text-0)', border: '1px solid var(--border)' },
    ghost: { background: 'transparent', color: 'var(--text-1)', border: '1px solid transparent' },
    outline: { background: 'transparent', color: 'var(--text-0)', border: '1px solid var(--border-2)' },
    danger: { background: 'transparent', color: 'var(--rose)', border: '1px solid var(--border)' },
  };
  return (
    <button style={{ ...base, ...variants[variant], ...style }} {...rest}
      onMouseEnter={e => { if (variant === 'ghost') e.currentTarget.style.background = 'var(--bg-hover)'; }}
      onMouseLeave={e => { if (variant === 'ghost') e.currentTarget.style.background = 'transparent'; }}>
      {icon && <Icon name={icon} size={14} />}
      {children}
    </button>
  );
};

const StatusPill = ({ status }) => {
  const map = {
    pending:   { label: 'pending',   color: 'var(--text-2)',  bg: 'var(--bg-3)',          dot: 'var(--text-3)' },
    queued:    { label: 'queued',    color: '#c9a96e',         bg: 'rgba(245,158,11,.10)', dot: '#f59e0b' },
    running:   { label: 'running',   color: 'var(--emerald)',  bg: 'rgba(16,185,129,.12)', dot: 'var(--emerald)', pulse: true },
    pushing:   { label: 'pushing',   color: 'var(--sky)',      bg: 'rgba(56,189,248,.12)', dot: 'var(--sky)', pulse: true },
    done:      { label: 'success',   color: '#047857',  bg: 'rgba(16,185,129,.18)', dot: 'var(--emerald)' },
    review:    { label: 'review',    color: 'var(--violet)',   bg: 'rgba(167,139,250,.12)', dot: 'var(--violet)', pulse: true },
    failed:    { label: 'failed',    color: 'var(--rose)',     bg: 'rgba(244,63,94,.10)',  dot: 'var(--rose)' },
    cancelled: { label: 'cancelled', color: 'var(--amber)',    bg: 'rgba(245,158,11,.10)', dot: 'var(--amber)' },
    blocked:   { label: 'blocked',   color: 'var(--text-2)',   bg: 'var(--bg-3)',          dot: 'var(--text-3)' },
  };
  const s = map[status] ?? map.pending;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'3px 8px 3px 7px',
      borderRadius:999, fontSize:11, fontWeight:500, letterSpacing:'.02em',
      background:s.bg, color:s.color, fontFamily:'var(--mono)' }}>
      <span style={{width:6, height:6, borderRadius:'50%', background:s.dot,
        animation: s.pulse ? 'pulse-dot 1.4s ease-in-out infinite' : 'none' }}/>
      {s.label}
    </span>
  );
};

const Chip = ({ icon, children, tone = 'neutral', style }) => {
  const tones = {
    neutral: { c: 'var(--text-1)', bg: 'var(--bg-3)', b: 'var(--border)' },
    accent:  { c: 'var(--emerald)', bg: 'rgba(16,185,129,.08)', b: 'rgba(16,185,129,.25)' },
    violet:  { c: 'var(--violet)', bg: 'rgba(167,139,250,.10)', b: 'rgba(167,139,250,.25)' },
    warn:    { c: 'var(--amber)', bg: 'rgba(245,158,11,.10)', b: 'rgba(245,158,11,.25)' },
  };
  const t = tones[tone];
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5,
      height:22, padding:'0 8px', borderRadius:6, fontSize:11, fontWeight:500,
      color:t.c, background:t.bg, border:`1px solid ${t.b}`, fontFamily:'var(--mono)', ...style }}>
      {icon && <Icon name={icon} size={11} />}
      {children}
    </span>
  );
};

// UsageRing — SVG ring progress
const UsageRing = ({ pct, size = 44, stroke = 4, label }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const dash = (pct / 100) * c;
  const color = pct >= 90 ? 'var(--rose)' : pct >= 75 ? 'var(--amber)' : 'var(--emerald)';
  return (
    <div style={{position:'relative', width:size, height:size}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} stroke="var(--border)" strokeWidth={stroke} fill="none"/>
        <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
          strokeDasharray={`${dash} ${c}`} strokeLinecap="round"
          style={{transition:'stroke-dasharray .4s ease'}}/>
      </svg>
      <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center',
        justifyContent:'center', fontSize:10, fontWeight:600, fontFamily:'var(--mono)',
        color:'var(--text-0)'}}>
        {pct}%
      </div>
      {label && <div style={{textAlign:'center', fontSize:9, color:'var(--text-2)',
        marginTop:2, letterSpacing:'.1em', textTransform:'uppercase'}}>{label}</div>}
    </div>
  );
};

// Format helpers
const fmtDuration = (ms) => {
  if (!ms || ms < 0) return '—';
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ${s % 60}s`;
  const h = Math.floor(m / 60);
  return `${h}h ${m % 60}m`;
};
const fmtCountdown = (ms) => {
  if (ms <= 0) return '0s';
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h >= 24) return `${Math.floor(h/24)}d ${h%24}h`;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${sec}s`;
  return `${sec}s`;
};
const fmtNum = (n) => n.toLocaleString();

Object.assign(window, { Icon, Btn, StatusPill, Chip, UsageRing, fmtDuration, fmtCountdown, fmtNum });

  </script>
  <script type="text/babel" data-file="task-card.jsx">
/* global React */
const { useState: tdS, useEffect: tdE, useRef: tdR, useMemo: tdM } = React;

// ──────────────────────────────────────────────
// Task Card (kanban item)
// ──────────────────────────────────────────────
function TaskCard({ task, onOpen, onRun, onEdit, onDelete, onPreview, onApprove, onReject, dragHandlers, isDragging, runtimeMs }) {
  const waits = task.waitsOn?.length > 0;
  const canRun = task.status === 'pending' || task.status === 'failed' || task.status === 'queued';
  const inReview = task.status === 'review';
  return (
    <article
      {...dragHandlers}
      onClick={onOpen}
      style={{
        background: 'var(--bg-2)',
        border: '1px solid var(--border)',
        borderRadius: 'var(--radius)',
        padding: 12,
        cursor: 'pointer',
        transition: 'border-color .12s, transform .12s, box-shadow .12s',
        opacity: isDragging ? 0.4 : 1,
        position: 'relative',
      }}
      onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--border-2)'; }}
      onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; }}
    >
      {task.status === 'running' && (
        <div style={{position:'absolute', top:0, left:0, right:0, height:2, borderRadius:'10px 10px 0 0',
          overflow:'hidden'}}>
          <div className="shimmer-bar" style={{height:'100%', width:'100%'}}/>
        </div>
      )}

      <header style={{display:'flex', alignItems:'flex-start', gap:8, marginBottom:8}}>
        <span style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--text-3)', marginTop:2}}>
          #{task.index}
        </span>
        <h3 style={{margin:0, fontSize:13, fontWeight:600, color:'var(--text-0)',
          lineHeight:1.35, flex:1, letterSpacing:'-.005em'}}>
          {task.title}
        </h3>
        <button onClick={(e)=>{e.stopPropagation(); onEdit();}}
          style={{background:'transparent', border:'none', color:'var(--text-3)', cursor:'pointer',
            padding:2, borderRadius:4, display:'flex'}}
          onMouseEnter={e => e.currentTarget.style.color='var(--text-0)'}
          onMouseLeave={e => e.currentTarget.style.color='var(--text-3)'}
          title="More">
          <Icon name="more" size={14}/>
        </button>
      </header>

      {task.description && (
        <p style={{margin:'0 0 10px', fontSize:12, color:'var(--text-2)', lineHeight:1.5,
          display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical',
          overflow:'hidden'}}>
          {task.description}
        </p>
      )}

      {/* chips row */}
      <div style={{display:'flex', flexWrap:'wrap', gap:5, marginBottom:10}}>
        {task.branch && <Chip icon="git">{task.branch.replace('zibby/','')}</Chip>}
        {task.prUrl && <Chip icon="github" tone="accent">PR #{task.prUrl.split('/').pop()}</Chip>}
        {task.model && <Chip icon="sparkle" tone="violet">{task.model}</Chip>}
        {waits && <Chip icon="clock" tone="warn">waits #{task.waitsOn.join(', #')}</Chip>}
      </div>

      {/* footer: meta + actions */}
      <footer style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:8}}>
        <div style={{display:'flex', alignItems:'center', gap:10, fontSize:11,
          fontFamily:'var(--mono)', color:'var(--text-3)'}}>
          {task.status === 'running' && runtimeMs != null && (
            <span style={{color:'var(--emerald)', display:'flex', alignItems:'center', gap:4}}>
              <span className="dot-running"/> {fmtDuration(runtimeMs)}
            </span>
          )}
          {task.status === 'done' && task.endedAt && task.startedAt && (
            <span style={{display:'flex', alignItems:'center', gap:4}}>
              <Icon name="check" size={11}/> {fmtDuration(task.endedAt - task.startedAt)}
            </span>
          )}
          {task.status === 'failed' && task.endedAt && task.startedAt && (
            <span style={{color:'var(--rose)', display:'flex', alignItems:'center', gap:4}}>
              <Icon name="warn" size={11}/> {fmtDuration(task.endedAt - task.startedAt)}
            </span>
          )}
          {task.tokens && (
            <span title="tokens in / out">
              ↑{(task.tokens.in/1000).toFixed(1)}k ↓{(task.tokens.out/1000).toFixed(1)}k
            </span>
          )}
        </div>

        {task.status !== 'review' && <StatusPill status={task.status}/>}
      </footer>

      {inReview && (
        <div onClick={e => e.stopPropagation()}
          style={{
            marginTop:10, paddingTop:10, borderTop:'1px solid var(--border)',
            display:'flex', gap:6, alignItems:'center',
          }}>
          <button onClick={onPreview}
            title="Run app on this branch so you can review it manually"
            style={{
              flex:1, display:'inline-flex', alignItems:'center', justifyContent:'center',
              gap:6, padding:'7px 10px',
              background:'rgba(167,139,250,.12)',
              border:'1px solid rgba(167,139,250,.35)',
              color:'var(--violet)', borderRadius:6,
              fontSize:12, fontWeight:600, cursor:'pointer',
              transition:'background .12s',
            }}
            onMouseEnter={e => e.currentTarget.style.background = 'rgba(167,139,250,.22)'}
            onMouseLeave={e => e.currentTarget.style.background = 'rgba(167,139,250,.12)'}>
            <Icon name="play" size={12}/> Run preview
          </button>
        </div>
      )}

      {canRun && (
        <button
          onClick={(e)=>{e.stopPropagation(); onRun();}}
          style={{
            position:'absolute', inset:0, borderRadius:'var(--radius)',
            background:'transparent', border:'none', cursor:'pointer',
            pointerEvents:'none',
          }}
          aria-hidden
        />
      )}
    </article>
  );
}

// ──────────────────────────────────────────────
// Kanban Column
// ──────────────────────────────────────────────
function Column({ title, count, accent, tasks, onDropTask, children, id, headerAction }) {
  const [hover, setHover] = tdS(false);
  return (
    <section
      onDragOver={(e) => { e.preventDefault(); setHover(true); }}
      onDragLeave={() => setHover(false)}
      onDrop={(e) => {
        setHover(false);
        const id = e.dataTransfer.getData('text/task-id');
        if (id) onDropTask?.(id);
      }}
      style={{
        flex:1, minWidth:280,
        background:'var(--bg-1)',
        border:'1px solid var(--border)',
        borderRadius:12, padding:12,
        display:'flex', flexDirection:'column',
        gap:10, minHeight:420,
        transition:'background .12s, border-color .12s',
        ...(hover ? { background:'var(--bg-2)', borderColor: accent } : {}),
      }}
      data-col={id}
    >
      <header style={{display:'flex', alignItems:'center', gap:8, padding:'2px 4px'}}>
        <span style={{width:7, height:7, borderRadius:'50%', background:accent}}/>
        <h2 style={{margin:0, fontSize:12, fontWeight:600, color:'var(--text-1)',
          letterSpacing:'.08em', textTransform:'uppercase'}}>{title}</h2>
        <span style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--text-3)',
          background:'var(--bg-3)', padding:'1px 7px', borderRadius:999}}>
          {count}
        </span>
        <div style={{flex:1}}/>
        {headerAction}
      </header>
      <div style={{display:'flex', flexDirection:'column', gap:8, flex:1}}>
        {children}
        {tasks?.length === 0 && (
          <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center',
            color:'var(--text-3)', fontSize:11, fontStyle:'italic', padding:'20px 10px',
            border:'1px dashed var(--border)', borderRadius:8, minHeight:80}}>
            drop tasks here
          </div>
        )}
      </div>
    </section>
  );
}

Object.assign(window, { TaskCard, Column });

  </script>
  <script type="text/babel" data-file="drawer.jsx">
/* global React */
const { useState: drS, useEffect: drE, useMemo: drM, useRef: drR } = React;

// ──────────────────────────────────────────────
// Task Detail Drawer with tabs: Logs / Diff / Details
// ──────────────────────────────────────────────
function TaskDrawer({ task, open, onClose, onRun, tab, setTab, runtimeMs }) {
  drE(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === '1') setTab('logs');
      if (e.key === '2') setTab('diff');
      if (e.key === '3') setTab('details');
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose, setTab]);

  if (!task) return null;

  return (
    <>
      <div
        onClick={onClose}
        style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,.5)', zIndex:50,
          opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none',
          transition:'opacity .18s',
        }}
      />
      <aside style={{
        position:'fixed', top:0, right:0, bottom:0, width: 'min(720px, 92vw)',
        background:'var(--bg-1)', borderLeft:'1px solid var(--border)',
        zIndex:51, display:'flex', flexDirection:'column',
        transform: open ? 'translateX(0)' : 'translateX(100%)',
        transition:'transform .22s cubic-bezier(.2,.7,.3,1)',
        boxShadow:'var(--shadow-2)',
      }}>
        {/* Header */}
        <header style={{padding:'14px 18px 12px', borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:8}}>
            <span style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--text-3)'}}>#{task.index}</span>
            <StatusPill status={task.status}/>
            {task.status === 'running' && runtimeMs != null && (
              <span style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--emerald)'}}>
                {fmtDuration(runtimeMs)}
              </span>
            )}
            <div style={{flex:1}}/>
            <Btn icon="play" variant="primary" size="sm" onClick={onRun}>Run</Btn>
            <Btn icon="x" variant="ghost" size="sm" onClick={onClose}/>
          </div>
          <h2 style={{margin:'2px 0 6px', fontSize:18, fontWeight:600, letterSpacing:'-.01em'}}>
            {task.title}
          </h2>
          <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
            {task.branch && <Chip icon="git">{task.branch}</Chip>}
            {task.prUrl && <Chip icon="github" tone="accent">PR #{task.prUrl.split('/').pop()}</Chip>}
            {task.model && <Chip icon="sparkle" tone="violet">{task.model}</Chip>}
            {task.tokens && <Chip icon="bolt">↑{fmtNum(task.tokens.in)} ↓{fmtNum(task.tokens.out)}</Chip>}
          </div>
        </header>

        {/* Tabs */}

// ──────────────────────────────────────────────
// Description input + File tree with drag-drop
// ──────────────────────────────────────────────

// Textarea that accepts files dropped from the FileTree and inserts their
// @/path reference at the caret position (or appends if the textarea isn't
// focused). Shows a drop overlay while dragging.
function DescriptionInput({ value, onChange }) {
  const ref = shR(null);
  const [over, setOver] = shS(false);

  const insertAtCaret = (text) => {
    const el = ref.current;
    if (!el) { onChange(value + text); return; }
    const start = el.selectionStart ?? value.length;
    const end = el.selectionEnd ?? value.length;
    const before = value.slice(0, start);
    const after = value.slice(end);
    // Ensure a space before the ref when inserting mid-sentence
    const needsSpaceBefore = before.length && !/\s$/.test(before);
    const needsSpaceAfter = after.length && !/^\s/.test(after);
    const inserted = (needsSpaceBefore ? ' ' : '') + text + (needsSpaceAfter ? ' ' : '');
    const next = before + inserted + after;
    onChange(next);
    // Restore caret after inserted text
    requestAnimationFrame(() => {
      el.focus();
      const pos = before.length + inserted.length;
      el.setSelectionRange(pos, pos);
    });
  };

  const onDragOver = (e) => {
    // Accept either our custom type or generic text (plain-text fallback)
    if (e.dataTransfer.types.includes('application/x-zibby-path') ||
        e.dataTransfer.types.includes('text/plain')) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
      setOver(true);
    }
  };
  const onDragLeave = () => setOver(false);
  const onDrop = (e) => {
    e.preventDefault();
    setOver(false);
    const path = e.dataTransfer.getData('application/x-zibby-path')
              || e.dataTransfer.getData('text/plain');
    if (path && path.startsWith('@/')) insertAtCaret(path);
  };

  return (
    <div style={{position:'relative', display:'flex', minHeight:170}}>
      <textarea ref={ref} value={value} onChange={e => onChange(e.target.value)}
        onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}
        placeholder="Describe the work. Drag a file or folder from the tree → it'll be inserted as @/path/to/file."
        style={{...inputStyle, resize:'vertical', flex:1, minHeight:170,
          outline: over ? '2px dashed var(--emerald)' : undefined,
          outlineOffset: over ? -3 : undefined}}/>
      {over && (
        <div style={{
          position:'absolute', inset:0, pointerEvents:'none',
          background:'var(--accent-soft)', borderRadius:8,
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:12, color:'var(--emerald)', fontWeight:500,
          fontFamily:'var(--mono)',
        }}>
          drop to insert @/path
        </div>
      )}
    </div>
  );
}

// Lightweight file tree rendered in a scrollable panel next to the
// description textarea. Each node is draggable; dropping into the textarea
// inserts "@/relative/path". Folders expand/collapse.
// A search input filters nodes by substring on name OR full path; matching
// nodes (and their ancestor directories, so the path stays visible) are kept,
// and matched substrings are highlighted. Ancestors of matches auto-expand.
function FileTreePanel({ folder, onHide }) {
  const tree = folder?.tree || [];
  const [query, setQuery] = shS('');
  const q = query.trim().toLowerCase();

  // Recursively filter: keep a file if its name/path contains q; keep a dir
  // if it matches OR any descendant matches (descendants are then filtered).
  const filter = (nodes, parentPath) => {
    const out = [];
    for (const n of nodes) {
      const full = parentPath ? `${parentPath}/${n.name}` : n.name;
      const selfMatch = !q
        || n.name.toLowerCase().includes(q)
        || full.toLowerCase().includes(q);
      if (n.type === 'dir') {
        const kids = n.children ? filter(n.children, full) : [];
        if (selfMatch || kids.length > 0) {
          out.push({ ...n, children: selfMatch ? (n.children || []) : kids });
        }
      } else if (selfMatch) {
        out.push(n);
      }
    }
    return out;
  };
  const filtered = q ? filter(tree, '') : tree;

  // Count matching files (leaves) so the header can show a result count
  const countFiles = (nodes) => {
    let c = 0;
    for (const n of nodes) {
      if (n.type === 'dir') c += countFiles(n.children || []);
      else c += 1;
    }
    return c;
  };
  const matchCount = q ? countFiles(filtered) : null;

  return (
    <div style={{
      background:'var(--bg-2)', border:'1px solid var(--border)',
      borderRadius:8, display:'flex', flexDirection:'column',
      overflow:'hidden', minHeight:170,
    }}>
      <div style={{
        padding:'6px 10px', fontSize:10, fontWeight:600, letterSpacing:'.1em',
        textTransform:'uppercase', color:'var(--text-3)',
        borderBottom:'1px solid var(--border)',
        display:'flex', alignItems:'center', gap:6,
        background:'var(--bg-1)',
      }}>
        <Icon name="folder" size={11}/>
        <span style={{flex:1, fontFamily:'var(--mono)', textTransform:'none',
          letterSpacing:0, color:'var(--text-2)', fontSize:10,
          overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
          {folder?.name || 'project'}
        </span>
        <span style={{fontSize:9, color:'var(--text-3)'}} title="Drag to insert">⇢</span>
        {onHide && (
          <button onClick={onHide} title="Hide file tree"
            style={{
              background:'transparent', border:'none', color:'var(--text-3)',
              cursor:'pointer', padding:2, borderRadius:4, display:'flex',
              marginLeft:2,
            }}
            onMouseEnter={e => e.currentTarget.style.color = 'var(--text-1)'}
            onMouseLeave={e => e.currentTarget.style.color = 'var(--text-3)'}>
            <Icon name="x" size={11}/>
          </button>
        )}
      </div>

      {/* Search bar — substring match on name or path. Clear button appears
          when there's a query. */}
      <div style={{
        padding:'6px 8px', borderBottom:'1px solid var(--border)',
        position:'relative', display:'flex', alignItems:'center', gap:6,
        background:'var(--bg-1)',
      }}>
        <span style={{position:'absolute', left:16, color:'var(--text-3)',
          display:'flex', pointerEvents:'none'}}>
          <Icon name="search" size={11}/>
        </span>
        <input
          value={query}

// Highlight occurrences of `q` (lowercase) inside `text` using the accent color.
// Case-insensitive; preserves original casing of the text.
function highlightMatch(text, q) {
  if (!q) return text;
  const lower = text.toLowerCase();
  const out = [];
  let i = 0;
  while (i < text.length) {
    const at = lower.indexOf(q, i);
    if (at === -1) { out.push(text.slice(i)); break; }
    if (at > i) out.push(text.slice(i, at));
    out.push(
      <mark key={at} style={{
        background:'var(--accent-soft)', color:'var(--emerald)',
        padding:0, borderRadius:2, fontWeight:600,
      }}>{text.slice(at, at + q.length)}</mark>
    );
    i = at + q.length;
  }
  return out;
}

function TreeNode({ node, path, depth, query }) {
  // When searching, force-expand so matches stay visible; otherwise default
  // to open at the first level and closed below.
  const [openState, setOpen] = shS(depth < 1);
  const open = query ? true : openState;
  const fullPath = path ? `${path}/${node.name}` : node.name;
  const ref = `@/${fullPath}`;
  const isDir = node.type === 'dir';

  const onDragStart = (e) => {
    // Custom type to detect drops from our own tree; text/plain for fallback
    e.dataTransfer.effectAllowed = 'copy';
    e.dataTransfer.setData('application/x-zibby-path', ref);
    e.dataTransfer.setData('text/plain', ref);
    // Improve drag preview with just the ref text
    try {
      const ghost = document.createElement('div');
      ghost.textContent = ref;
      ghost.style.cssText = 'position:absolute;top:-9999px;left:-9999px;' +
        'padding:4px 8px;background:#0f1114;color:#10b981;' +
        'font:12px "JetBrains Mono",monospace;border:1px solid #10b981;' +
        'border-radius:6px;';
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, 0, 0);
      setTimeout(() => document.body.removeChild(ghost), 0);
    } catch { /* noop */ }
  };

  return (
    <>
      <div draggable onDragStart={onDragStart}
        onClick={() => isDir && !query && setOpen(o => !o)}
        title={`Drag to insert ${ref}`}
        style={{
          display:'flex', alignItems:'center', gap:4,
          padding:`2px 6px 2px ${6 + depth * 12}px`,
          borderRadius:4, cursor: isDir ? 'pointer' : 'grab',
          color: isDir ? 'var(--text-1)' : 'var(--text-2)',
          userSelect:'none',
        }}
        onMouseEnter={(e) => e.currentTarget.style.background = 'var(--bg-3)'}
        onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
        {isDir ? (
          <span style={{display:'flex', width:10, color:'var(--text-3)',
            transform: open ? 'rotate(90deg)' : 'rotate(0)', transition:'transform .1s'}}>
            <Icon name="chevronRight" size={10}/>
          </span>
        ) : (
          <span style={{width:10}}/>
        )}
        <span style={{display:'flex', color: isDir ? 'var(--amber)' : 'var(--text-3)'}}>
          <Icon name={isDir ? 'folder' : 'file'} size={11}/>
        </span>
        <span style={{flex:1, overflow:'hidden', textOverflow:'ellipsis',
          whiteSpace:'nowrap'}}>{highlightMatch(node.name, query)}</span>
      </div>
      {isDir && open && node.children && node.children.map((c, i) => (
        <TreeNode key={c.name + i} node={c} path={fullPath} depth={depth + 1} query={query}/>
      ))}
    </>
  );
}

function CommandPalette({ open, onClose, commands }) {
  const [q, setQ] = shS('');
  const [i, setI] = shS(0);
  const inputRef = shR(null);

  shE(() => {
    if (open) { setQ(''); setI(0); setTimeout(() => inputRef.current?.focus(), 10); }
  }, [open]);

  const matches = shM(() => {
    const ql = q.toLowerCase();
    return commands.filter(c => !ql || c.label.toLowerCase().includes(ql) ||
      c.hint?.toLowerCase().includes(ql));
  }, [q, commands]);

  shE(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowDown') { e.preventDefault(); setI(v => Math.min(v+1, matches.length-1)); }
      if (e.key === 'ArrowUp')   { e.preventDefault(); setI(v => Math.max(v-1, 0)); }
      if (e.key === 'Enter') { e.preventDefault(); matches[i]?.run(); onClose(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, matches, i, onClose]);

  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,.55)', zIndex:70,

              fontSize:14, outline:'none'}}/>
          <kbd style={kbd}>esc</kbd>
        </div>
        <div style={{maxHeight:360, overflowY:'auto', padding:6}}>
          {matches.length === 0 && (
            <div style={{padding:24, textAlign:'center', color:'var(--text-3)', fontSize:12}}>

            </div>

          {matches.map((c, idx) => (
            <button key={c.id} onMouseEnter={() => setI(idx)}
              onClick={() => { c.run(); onClose(); }}
              style={{
                width:'100%', display:'flex', alignItems:'center', gap:10,
                padding:'8px 10px', background: idx === i ? 'var(--bg-3)' : 'transparent',
                border:'none', borderRadius:6, cursor:'pointer', textAlign:'left',

              {c.kbd && <kbd style={kbd}>{c.kbd}</kbd>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────
// Dependency Mini-graph
// ──────────────────────────────────────────────
function DependencyGraph({ tasks, onClickTask }) {
  if (!tasks?.length) return null;
  const deps = [];
  tasks.forEach(t => t.waitsOn?.forEach(dep => deps.push({ from: dep, to: t.index })));
  if (deps.length === 0) return null;

  const cols = [0, 0, 0];
  const place = {};
  tasks.forEach(t => {
    const depth = Math.min(2, Math.max(0, (t.waitsOn?.length || 0)));
    place[t.index] = { col: depth, row: cols[depth]++ };
  });

  const W = 520, H = 80, CW = W / 3;
  return (
    <div style={{
      padding:12, background:'var(--bg-1)', border:'1px solid var(--border)',
      borderRadius:10, overflow:'hidden',
    }}>
      <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:8}}>
        <Icon name="graph" size={12}/>
        <span style={{fontSize:10, fontWeight:600, letterSpacing:'.12em',
          textTransform:'uppercase', color:'var(--text-2)'}}>Dependencies</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', height:H, display:'block'}}>
        {deps.map((d, i) => {
          const a = place[d.from], b = place[d.to];
          if (!a || !b) return null;
          const x1 = a.col * CW + 50, y1 = 20 + a.row * 24;
          const x2 = b.col * CW + 50, y2 = 20 + b.row * 24;
          return <path key={i} d={`M${x1} ${y1} C${(x1+x2)/2} ${y1}, ${(x1+x2)/2} ${y2}, ${x2} ${y2}`}
            stroke="var(--border-2)" fill="none" strokeWidth="1"/>;
        })}
        {tasks.map(t => {
          const p = place[t.index];
          const x = p.col * CW + 50, y = 20 + p.row * 24;
          const color = t.status === 'done' ? 'var(--emerald)'
                      : t.status === 'running' ? 'var(--emerald)'
                      : t.status === 'failed' ? 'var(--rose)'
                      : 'var(--text-3)';
          return (
            <g key={t.index} style={{cursor:'pointer'}} onClick={() => onClickTask?.(t)}>
              <circle cx={x} cy={y} r="5" fill={color}
                style={{ filter: t.status === 'running' ? 'drop-shadow(0 0 4px var(--emerald))' : 'none' }}/>
              <text x={x + 10} y={y + 3} fontSize="10" fill="var(--text-2)"
                fontFamily="var(--mono)">
                #{t.index} {t.title.slice(0, 22)}{t.title.length > 22 ? '…' : ''}
              </text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

  const [sortBy, setSortBy] = amS('date-desc'); // date-desc | date-asc | title

  // Reset selection whenever the archive is opened
  amE(() => { if (open) { setSelected(new Set()); setQuery(''); setStatusFilter('all'); } }, [open]);

  // Esc to close
  amE(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  const filtered = amM(() => {
    const q = query.trim().toLowerCase();
    const list = tasks.filter(t =>
      (statusFilter === 'all' || t.status === statusFilter) &&
      (!q || t.title.toLowerCase().includes(q) || t.description.toLowerCase().includes(q) ||
        (t.branch && t.branch.toLowerCase().includes(q)))
    );
    if (sortBy === 'title') list.sort((a, b) => a.title.localeCompare(b.title));
    else if (sortBy === 'date-asc') list.sort((a, b) => (a.archivedAt || 0) - (b.archivedAt || 0));
    else list.sort((a, b) => (b.archivedAt || 0) - (a.archivedAt || 0));
    return list;
  }, [tasks, query, statusFilter, sortBy]);

  // Group by relative date bucket: Today / Yesterday / This week / Earlier
  const grouped = amM(() => {
    const now = new Date(); now.setHours(0,0,0,0);
    const day = 86400000;
    const bucketsOrder = ['Today', 'Yesterday', 'This week', 'Earlier'];
    const buckets = { Today:[], Yesterday:[], 'This week':[], Earlier:[] };
    for (const t of filtered) {
      const at = t.archivedAt ? new Date(t.archivedAt) : null;
      if (!at) { buckets.Earlier.push(t); continue; }
      const d = new Date(at); d.setHours(0,0,0,0);
      const diff = (now - d) / day;
      if (diff <= 0) buckets.Today.push(t);
      else if (diff <= 1) buckets.Yesterday.push(t);
      else if (diff <= 7) buckets['This week'].push(t);
      else buckets.Earlier.push(t);
    }
    return bucketsOrder.map(k => [k, buckets[k]]).filter(([, v]) => v.length > 0);
  }, [filtered]);

  const toggle = (id) => setSelected(s => {
    const next = new Set(s); if (next.has(id)) next.delete(id); else next.add(id);
    return next;
  });
  const allFilteredIds = filtered.map(t => t.id);
  const allSelected = allFilteredIds.length > 0 && allFilteredIds.every(id => selected.has(id));
  const toggleAll = () => setSelected(s => {
    if (allSelected) return new Set([...s].filter(id => !allFilteredIds.includes(id)));
    return new Set([...s, ...allFilteredIds]);
  });

  if (!open) return null;

  const statuses = [...new Set(tasks.map(t => t.status))];

  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,.6)', zIndex:60,
      display:'flex', alignItems:'center', justifyContent:'center',
      animation:'fade-in .14s ease', padding:24,
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        width:'min(1100px, 96vw)', height:'min(780px, 92vh)',
        background:'var(--bg-1)', border:'1px solid var(--border-2)',
        borderRadius:14, boxShadow:'var(--shadow-2)',
        animation:'slide-up .2s ease',
        display:'flex', flexDirection:'column', overflow:'hidden',
      }}>
        {/* Header */}
        <header style={{padding:'14px 20px', borderBottom:'1px solid var(--border)',
          display:'flex', alignItems:'center', gap:12, background:'var(--bg-1)'}}>
          <div style={{width:32, height:32, borderRadius:8, background:'var(--bg-3)',
            display:'flex', alignItems:'center', justifyContent:'center', color:'var(--sky)'}}>
            <Icon name="archive" size={16}/>
          </div>
          <div>
            <h2 style={{margin:0, fontSize:15, fontWeight:600}}>Archive</h2>
            <div style={{fontSize:11, color:'var(--text-3)', fontFamily:'var(--mono)'}}>
              {tasks.length} archived task{tasks.length === 1 ? '' : 's'}
              {filtered.length !== tasks.length && ` · ${filtered.length} shown`}
            </div>
          </div>
          <div style={{flex:1}}/>
          <button onClick={onClose} style={{background:'transparent', border:'none',
            color:'var(--text-3)', cursor:'pointer', padding:6, borderRadius:6, display:'flex'}}
            onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-3)'}
            onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
            <Icon name="x" size={16}/>
          </button>
        </header>

        {/* Toolbar: search + filters */}
        <div style={{padding:'12px 20px', borderBottom:'1px solid var(--border)',
          display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
          <div style={{display:'flex', alignItems:'center', gap:8, padding:'6px 10px',
            background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:8,
            minWidth:240, flex:'1 1 240px', maxWidth:360}}>
            <Icon name="search" size={13}/>
            <input value={query} onChange={e => setQuery(e.target.value)}
              placeholder="Search archived…"
              style={{flex:1, background:'transparent', border:'none',
                color:'var(--text-0)', fontSize:12, outline:'none'}}/>
            {query && (
              <button onClick={() => setQuery('')}
                style={{background:'transparent', border:'none', color:'var(--text-3)',
                  cursor:'pointer', padding:0, display:'flex'}}>
                <Icon name="x" size={11}/>
              </button>
            )}
          </div>

          <div style={{display:'flex', gap:4, background:'var(--bg-2)',
            border:'1px solid var(--border)', borderRadius:8, padding:2}}>
            {['all', ...statuses].map(s => (
              <button key={s} onClick={() => setStatusFilter(s)}
                style={{
                  padding:'4px 10px', fontSize:11, borderRadius:5,
                  background: statusFilter === s ? 'var(--bg-3)' : 'transparent',
                  border:'none', color: statusFilter === s ? 'var(--text-0)' : 'var(--text-2)',
                  cursor:'pointer', fontFamily:'var(--mono)',
                }}>{s}</button>
            ))}
          </div>

          <select value={sortBy} onChange={e => setSortBy(e.target.value)}
            style={{padding:'7px 10px', background:'var(--bg-2)',
              border:'1px solid var(--border)', borderRadius:8, color:'var(--text-1)',
              fontSize:11, fontFamily:'var(--mono)', outline:'none', cursor:'pointer'}}>
            <option value="date-desc">Newest first</option>
            <option value="date-asc">Oldest first</option>
            <option value="title">Title A→Z</option>
          </select>

          <div style={{flex:1}}/>

          {selected.size > 0 ? (
            <>
              <span style={{fontSize:11, color:'var(--text-2)', fontFamily:'var(--mono)'}}>
                {selected.size} selected
              </span>
              <Btn icon="arrowRight" variant="outline" size="sm"
                onClick={() => { [...selected].forEach(onRestore); setSelected(new Set()); }}>
                Restore
              </Btn>
              <Btn icon="trash" variant="outline" size="sm"
                onClick={() => {
                  if (confirm(`Permanently delete ${selected.size} task${selected.size===1?'':'s'}?`)) {
                    onDelete([...selected]); setSelected(new Set());
                  }
                }}>
                Delete
              </Btn>
            </>
          ) : (
            <button onClick={toggleAll} disabled={filtered.length === 0}
              style={{fontSize:11, padding:'4px 10px', background:'transparent',
                border:'1px solid var(--border)', borderRadius:6, color:'var(--text-2)',
                cursor: filtered.length === 0 ? 'not-allowed' : 'pointer',
                fontFamily:'var(--mono)', opacity: filtered.length === 0 ? .5 : 1}}>
              {allSelected ? 'Deselect all' : 'Select all'}
            </button>
          )}
        </div>

        {/* List */}
        <div style={{flex:1, overflowY:'auto', padding:'8px 0'}}>
          {filtered.length === 0 ? (
            <div style={{padding:'60px 20px', textAlign:'center', color:'var(--text-3)'}}>
              <div style={{marginBottom:10, opacity:.4}}>
                <Icon name="archive" size={32}/>
              </div>
              <div style={{fontSize:13, marginBottom:4}}>
                {tasks.length === 0 ? 'Nothing archived yet' : 'No matches'}
              </div>
              <div style={{fontSize:11, fontFamily:'var(--mono)'}}>
                {tasks.length === 0
                  ? 'Use the archive button in the Done column to archive completed tasks.'
                  : 'Try a different search or filter.'}
              </div>
            </div>
          ) : grouped.map(([bucket, rows]) => (
            <section key={bucket} style={{marginBottom:8}}>
              <header style={{
                padding:'8px 20px 4px', fontSize:10, fontWeight:600,
                letterSpacing:'.1em', textTransform:'uppercase',
                color:'var(--text-3)', position:'sticky', top:0,
                background:'var(--bg-1)', zIndex:1,
                display:'flex', alignItems:'center', gap:8,
              }}>
                {bucket}
                <span style={{fontFamily:'var(--mono)', letterSpacing:0, textTransform:'none',
                  color:'var(--text-3)', fontWeight:400}}>· {rows.length}</span>
              </header>
              {rows.map(t => (
                <ArchiveRow key={t.id} task={t}
                  selected={selected.has(t.id)}
                  onToggle={() => toggle(t.id)}
                  onRestore={() => onRestore(t.id)}
                  onDelete={() => {
                    if (confirm(`Delete "${t.title}" permanently?`)) onDelete([t.id]);
                  }}
                  onOpen={() => onOpenTask(t.id)}/>
              ))}
            </section>
          ))}
        </div>
      </div>
    </div>
  );
}

function ArchiveRow({ task, selected, onToggle, onRestore, onDelete, onOpen }) {
  const archivedAgo = task.archivedAt
    ? fmtRelative(Date.now() - task.archivedAt)
    : '—';
  return (
    <div style={{
      padding:'10px 20px', display:'flex', alignItems:'center', gap:12,
      borderBottom:'1px solid var(--border)',
      background: selected ? 'var(--accent-soft)' : 'transparent',
      cursor:'default', transition:'background .1s',
    }}
      onMouseEnter={e => { if (!selected) e.currentTarget.style.background = 'var(--bg-2)'; }}
      onMouseLeave={e => { if (!selected) e.currentTarget.style.background = 'transparent'; }}>

      <input type="checkbox" checked={selected} onChange={onToggle}
        style={{cursor:'pointer', accentColor:'var(--emerald)'}}/>

      <span style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--text-3)',
        width:30, flexShrink:0}}>#{task.index}</span>

      <div style={{flex:1, minWidth:0, cursor:'pointer'}} onClick={onOpen}>
        <div style={{fontSize:13, color:'var(--text-0)', fontWeight:500,
          overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
          marginBottom:2}}>
          {task.title}
        </div>
        <div style={{display:'flex', alignItems:'center', gap:10, fontSize:11,
          color:'var(--text-3)', fontFamily:'var(--mono)'}}>
          {task.branch && (
            <span style={{display:'flex', alignItems:'center', gap:4}}>
              <Icon name="git" size={10}/> {task.branch.replace('zibby/','')}
            </span>
          )}
          {task.prUrl && (
            <span style={{color:'var(--emerald)'}}>PR #{task.prUrl.split('/').pop()}</span>
          )}
          {task.tokens && (
            <span>↑{(task.tokens.in/1000).toFixed(1)}k ↓{(task.tokens.out/1000).toFixed(1)}k</span>
          )}
        </div>
      </div>

      <StatusPill status={task.status}/>

      <span style={{fontSize:11, fontFamily:'var(--mono)', color:'var(--text-3)',
        width:80, textAlign:'right', flexShrink:0}}>
        {archivedAgo}
      </span>

      <div style={{display:'flex', gap:4}}>
        <button onClick={onRestore} title="Restore to Done"
          style={rowBtn}
          onMouseEnter={e => { e.currentTarget.style.background = 'rgba(16,185,129,.15)'; e.currentTarget.style.color='var(--emerald)'; }}
          onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color='var(--text-3)'; }}>
          <Icon name="arrowRight" size={12}/>
        </button>
        <button onClick={onDelete} title="Delete permanently"
          style={rowBtn}
          onMouseEnter={e => { e.currentTarget.style.background = 'rgba(244,63,94,.15)'; e.currentTarget.style.color='var(--rose)'; }}
          onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color='var(--text-3)'; }}>
          <Icon name="trash" size={12}/>
        </button>
      </div>
    </div>
  );
}

const rowBtn = {
  display:'flex', alignItems:'center', justifyContent:'center',
  width:26, height:26, background:'transparent',
  border:'1px solid var(--border)', borderRadius:5,
  color:'var(--text-3)', cursor:'pointer',
  transition:'background .12s, color .12s',
};

function fmtRelative(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 30) return `${d}d ago`;
  return new Date(Date.now() - ms).toLocaleDateString();
}

window.ArchiveModal = ArchiveModal;
