services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ${WORKSPACE_PATH:-./workspace}:/workspace
      - orchestrator-data:/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/data/db.sqlite
      - REPO_PATH=/workspace
      - NODE_ENV=production
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Agent Orchestrator}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-agent@localhost}
      - GIT_COMMITTER_NAME=${GIT_COMMITTER_NAME:-Agent Orchestrator}
      - GIT_COMMITTER_EMAIL=${GIT_COMMITTER_EMAIL:-agent@localhost}
    restart: unless-stopped

volumes:
  orchestrator-data:
